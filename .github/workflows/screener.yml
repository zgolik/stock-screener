name: Daily Stock Screener

on:
  schedule:
    # 15:00 UTC = 17:00 CEST (lato) / 16:00 CET (zima)
    - cron: '0 15 * * 1-5'
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy requests

      - name: Run screener
        run: |
          python scripts/screener.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Verify output
        run: |
          if [ ! -f results/results.json ]; then
            echo "BŁĄD: results/results.json nie został wygenerowany!"
            exit 1
          fi
          COUNT=$(python3 -c "import json; d=json.load(open('results/results.json')); print(len(d))")
          echo "✅ Wyników: ${COUNT}"

      - name: Copy HTML to docs (GitHub Pages)
        run: |
          mkdir -p docs
          cp results/index.html docs/index.html
          echo "✅ Skopiowano index.html → docs/"

      - name: Commit results to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add results/
          git add docs/index.html

          git diff --staged --quiet || \
            git commit -m "📊 Screener results $(date -u +'%Y-%m-%d %H:%M UTC')"

          git push
