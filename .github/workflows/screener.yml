name: Stock Screener SMI

on:
  schedule:
    # Backup. Niezawodne odpalanie zrob przez zewnetrzny workflow_dispatch (cron-job.org).
    # Minuta != 0 i nietypowa godzina = mniej zatloczony slot, mniejsze opoznienia.
    - cron: '23 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Zapobiega kolizji rownoleglych deployow Pages.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        # Piny zakresowe = stabilnosc (yfinance czesto psuje sie miedzy wydaniami).
        # Jak potwierdzisz konkretna dzialajaca wersje, ustaw ja na sztywno (np. yfinance==0.2.65).
        run: pip install "yfinance>=0.2.40,<0.3" "pandas>=2.0,<3" "numpy<2.1" requests

      - name: Run screener
        run: python scripts/screener.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Save dated copy of results
        run: |
          DATE=$(date -u +'%Y-%m-%d')
          cp results/results_main.json "results/results_main_${DATE}.json"
          echo "✅ Saved results_main_${DATE}.json"
          # Przycinanie po DACIE Z NAZWY pliku, nie po mtime.
          # (actions/checkout resetuje mtime plikow do "teraz" -> -mtime +30 nigdy nie trafia)
          CUTOFF=$(date -u -d '30 days ago' +'%Y-%m-%d')
          for f in results/results_main_*.json; do
            d=$(echo "$f" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' | head -1)
            if [ -n "$d" ] && [ "$d" \< "$CUTOFF" ]; then
              rm "$f" && echo "🗑️ Pruned $f"
            fi
          done

      - name: Verify output
        run: |
          DATE=$(date -u +'%Y-%m-%d')
          for f in results/index.html results/screener.html results/index_all.html \
                   results/results.json results/results_main.json \
                   results/results_main_${DATE}.json; do
            if [ ! -f "$f" ]; then
              echo "BLAD: brak pliku $f"
              exit 1
            fi
          done
          FULL=$(python3 -c "import json; print(len(json.load(open('results/results.json'))))")
          MAIN=$(python3 -c "import json; print(len(json.load(open('results/results_main.json'))))")
          # Kontrola jakosci danych: ile rekordow bez sektora (objaw awarii/rate-limitu yfinance)
          NULLSEC=$(python3 -c "import json; d=json.load(open('results/results_main.json')); print(sum(1 for x in d if x.get('sector') in (None,'','--')))")
          echo "✅ Full Scan: ${FULL} | Screener glowny: ${MAIN} | Bez sektora: ${NULLSEC}/${MAIN}"
          # Twardy blad tylko gdy WSZYSTKIE rekordy bez sektora = dane sa smieciowe, nie commituj.
          if [ "$MAIN" -gt 0 ] && [ "$NULLSEC" -ge "$MAIN" ]; then
            echo "BLAD: wszystkie rekordy bez sektora - prawdopodobnie awaria yfinance. Przerywam."
            exit 1
          fi

      - name: Generate Claude prompt file
        run: |
          [ -f scripts/make_prompt.py ] && python scripts/make_prompt.py || true

      - name: Commit wynikow do repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          if git diff --staged --quiet; then
            echo "Brak zmian do commitu"
          else
            git commit -m "📊 SMI scan $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Odporny push: rebase + retry na wypadek wyscigu z innym commitem.
            for i in 1 2 3; do
              if git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push; then
                echo "Push OK (proba $i)"; break
              fi
              echo "Push retry $i..."; sleep 5
            done
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: results/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
