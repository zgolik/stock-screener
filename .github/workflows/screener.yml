name: Daily Stock Screener
on:
  schedule:
    - cron: '0 15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    # ── WYMAGANE przez actions/deploy-pages@v4 ──
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Run screener
        run: python scripts/screener.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Verify output
        run: |
          if [ ! -f results/results.json ]; then
            echo "BŁĄD: results/results.json nie został wygenerowany!"
            exit 1
          fi
          COUNT=$(python3 -c "import json; d=json.load(open('results/results.json')); print(len(d))")
          echo "✅ Wyników: ${COUNT}"

      - name: Generate Claude.ai prompt file
        run: python scripts/make_prompt.py

      - name: Copy landing page to results/
        run: |
          # Kopiuje stronę startową jeśli istnieje w static/
          # Jeśli nie – pomija (nie przerywa workflow)
          cp static/index.html results/index.html \
            && echo "✅ Landing page skopiowana" \
            || echo "⚠️  static/index.html nie znaleziono – pomijam"

      - name: Commit JSON results to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --staged --quiet || \
            git commit -m "📊 Screener results $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: results/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
