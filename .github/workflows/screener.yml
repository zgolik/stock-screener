name: Daily Stock Screener

on:
  schedule:
    # 15:00 UTC = 17:00 CEST (lato) / 16:00 CET (zima)
    # Uruchamia się pon–pt
    - cron: '0 15 * * 1-5'

  # Możliwość ręcznego uruchomienia z GitHub UI
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # potrzebne do commitu JSON

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy requests

      - name: Run screener
        run: |
          python screener.py
        env:
          PYTHONUNBUFFERED: "1"

      # Sprawdza czy JSON został wygenerowany
      - name: Verify JSON output
        run: |
          if [ ! -f data/screener_results.json ]; then
            echo "BŁĄD: data/screener_results.json nie został wygenerowany!"
            exit 1
          fi
          echo "✅ Znaleziono $(cat data/screener_results.json | python3 -c \
            'import json,sys; d=json.load(sys.stdin); print(d["total_signals"])') sygnałów"

      - name: Commit results to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/screener_results.json
          git add docs/index.html  || true   # raport HTML (jeśli generujesz)

          # Commit tylko jeśli są zmiany
          git diff --staged --quiet || \
            git commit -m "📊 Screener results $(date -u +'%Y-%m-%d %H:%M UTC')"

          git push
