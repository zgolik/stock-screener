name: Stock Screener – Full Scan (bez filtrów)

on:
  workflow_dispatch:
    inputs:
      include_strong_buy:
        description: 'Uwzględnij sygnały Strong BUY'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      include_buy:
        description: 'Uwzględnij sygnały BUY'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      include_turning_up:
        description: 'Uwzględnij sygnały Turning Up'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

  # Harmonogram – co poniedziałek o 07:30 UTC (9:30 PL czasu letniego)
  # Odkomentuj aby włączyć:
  # schedule:
  #   - cron: '30 7 * * 1'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scan:
    name: Full SMI Scan
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # ── WYMAGANE przez actions/deploy-pages@v4 ──
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Ustaw Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Zainstaluj biblioteki
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy requests

      - name: Ustaw zmienne środowiskowe
        run: |
          echo "INCLUDE_STRONG_BUY=${{ github.event.inputs.include_strong_buy || 'true' }}" >> $GITHUB_ENV
          echo "INCLUDE_BUY=${{ github.event.inputs.include_buy || 'true' }}"                >> $GITHUB_ENV
          echo "INCLUDE_TURNING_UP=${{ github.event.inputs.include_turning_up || 'true' }}" >> $GITHUB_ENV

      - name: Uruchom screener_all.py
        run: python scripts/screener_all.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Kopiuj wyniki do results/
        run: |
          mkdir -p results
          cp results_all/index.html   results/index_all.html
          cp results_all/results.json results/results_all.json 2>/dev/null || true
          cp results_all/strong.json  results/strong_all.json  2>/dev/null || true
          cp results_all/buy.json     results/buy_all.json     2>/dev/null || true
          cp results_all/turning.json results/turning_all.json 2>/dev/null || true
          cp results_all/meta.json    results/meta_all.json    2>/dev/null || true
          cp results_all/results.csv  results/results_all.csv  2>/dev/null || true
          # Landing page – kopiuj jeśli istnieje, pomiń jeśli nie
          cp static/index.html results/index.html \
            && echo "✅ Landing page skopiowana" \
            || echo "⚠️  static/index.html nie znaleziono – pomijam"

      - name: Podsumowanie skanu
        run: |
          python - <<'EOF'
          import json, os
          path = "results_all/meta.json"
          if os.path.exists(path):
              m = json.load(open(path))
              print(f"Przeskanowano : {m.get('total_scanned','?')} spolek")
              print(f"Sygnaly SMI  : {m.get('weekly_signals','?')}")
              print(f"Strong BUY   : {m.get('results_strong','?')}")
              print(f"BUY          : {m.get('results_buy','?')}")
              print(f"Turning Up   : {m.get('results_turning','?')}")
              print(f"Czas skanu   : {m.get('elapsed_min','?')} min")
          else:
              print("Brak pliku meta.json")
          EOF

      - name: Commit i push wynikow
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ results_all/ || true
          git diff --cached --quiet || \
            git commit -m "chore: full scan SMI $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: results/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
